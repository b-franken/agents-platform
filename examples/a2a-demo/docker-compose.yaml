services:
  legal-advisor:
    build:
      context: .
      dockerfile: Dockerfile.service-a
    ports:
      - "9000:9000"
    environment:
      - A2A_PORT=9000

  platform:
    build:
      context: ../..
    ports:
      - "8080:8080"
    env_file: ../../.env
    environment:
      - A2A_AGENTS=legal=http://legal-advisor:9000/a2a
    depends_on:
      - legal-advisor
