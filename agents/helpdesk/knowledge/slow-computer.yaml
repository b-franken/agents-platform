id: KB-008
title: Slow computer performance
keywords: slow computer performance lag freeze memory cpu
solution: |
  1. Restart your computer (a full restart, not just sleep/hibernate).
  2. Check Task Manager (Windows) or Activity Monitor (macOS) for high CPU/memory processes.
  3. Close unnecessary browser tabs (each tab uses ~100MB of memory).
  4. If persistent, request a hardware review via IT support.
